<!doctype html><html lang="zh"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>声音雕塑</title><style>*{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;background:#0a0a1a;font-family:sans-serif}canvas{display:block}#ui{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}h1{color:#e6edf3;font-size:1rem;text-shadow:0 2px 8px rgba(0,0,0,.8);margin-right:8px}.btn{background:rgba(255,255,255,.12);color:#e6edf3;border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:8px 18px;cursor:pointer;font-size:.85rem;backdrop-filter:blur(4px)}.btn:hover{background:rgba(255,255,255,.25)}.btn.recording{background:rgba(248,81,73,.3);border-color:#f85149;animation:pulse 1s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}.hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-size:.7rem;z-index:10}</style></head><body>
<div id="ui">
  <h1>🎙️ 声音雕塑</h1>
  <button class="btn" id="startBtn">🎤 开始录音</button>
  <button class="btn" data-m="bars">📊 环形柱</button>
  <button class="btn" data-m="wave">🌊 波浪面</button>
  <button class="btn" data-m="mountain">⛰️ 山峰</button>
</div>
<canvas id="c"></canvas>
<div class="hint">对着麦克风说话或唱歌，声音将转化为 3D 雕塑 | 鼠标拖拽旋转</div>
<script type="module" src="./src/main.ts"></script>
</body></html>
