<!doctype html><html lang="zh"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>白噪音发生器</title><style>@import url('@app-hub/utils/theme/variables.css');*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;padding:24px;display:flex;flex-direction:column;align-items:center}h1{font-size:1.5rem;margin-bottom:20px}.mixer{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;max-width:800px;width:100%}.channel{background:var(--bg-secondary);border:1px solid var(--border-secondary);border-radius:12px;padding:16px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;transition:border-color .2s}.channel.active{border-color:var(--accent)}.channel-icon{font-size:2rem}.channel-name{font-size:.85rem;color:var(--text-secondary)}.volume{width:100%;accent-color:var(--accent);writing-mode:vertical-lr;height:100px;direction:ltr}.volume-h{width:100%;accent-color:var(--accent)}.toggle{background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border-secondary);border-radius:20px;padding:6px 16px;cursor:pointer;font-size:.8rem;width:100%}.toggle.on{background:var(--accent);border-color:var(--accent);color:#fff}.master{margin-top:24px;max-width:800px;width:100%;display:flex;align-items:center;gap:12px;justify-content:center}.master label{font-size:.85rem;color:var(--text-secondary)}.controls{display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap}.controls .btn{background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border-secondary);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.8rem}.controls .btn:hover{background:var(--bg-tertiary)}.preset-controls{display:flex;gap:4px;align-items:center;margin-top:12px}.preset-controls select,.preset-controls input{border:1px solid var(--border-secondary);border-radius:4px;padding:4px 8px;font-size:.75rem;background:var(--bg-secondary);color:var(--text-primary)}.preset-controls input{width:100px}@media (max-width: 768px) { .mixer { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); } }</style></head><body><div id="app"></div><script type="module" src="./src/main.ts"></script></body></html>
