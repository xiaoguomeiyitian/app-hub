<!doctype html><html lang="zh"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>沃罗诺伊艺术</title><style>*{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;background:#0a0a1a;font-family:sans-serif}canvas{display:block}#ui{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;align-items:center}h1{color:#e6edf3;font-size:1.1rem;text-shadow:0 2px 8px rgba(0,0,0,.8);margin-right:8px}.btn{background:rgba(255,255,255,.1);color:#e6edf3;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:.8rem;backdrop-filter:blur(4px)}.btn:hover{background:rgba(255,255,255,.25)}label{color:rgba(255,255,255,.5);font-size:.75rem;display:flex;align-items:center;gap:4px}.hint{color:rgba(255,255,255,.3);font-size:.7rem}</style></head><body>
<div id="ui">
  <h1>🔷 沃罗诺伊艺术</h1>
  <button class="btn" id="clearBtn">🗑️ 清空</button>
  <button class="btn" id="exportBtn">💾 导出壁纸</button>
  <label>密度 <input type="range" id="densitySlider" min="2" max="20" value="8" style="width:60px;accent-color:#58a6ff"/></label>
  <span class="hint">移动=生成细胞 | 点击=碎裂</span>
</div>
<canvas id="c"></canvas>
<script type="module" src="./src/main.ts"></script>
</body></html>
