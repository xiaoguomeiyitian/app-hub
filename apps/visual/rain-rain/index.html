<!doctype html><html lang="zh"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>点击雨幕</title><style>*{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;background:#0a0a1a;font-family:sans-serif}canvas{display:block}#ui{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;align-items:center}h1{color:#e6edf3;font-size:1.2rem;text-shadow:0 2px 8px rgba(0,0,0,.8);margin-right:8px}.btn{background:rgba(255,255,255,.12);color:#e6edf3;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:.8rem;backdrop-filter:blur(4px)}.btn:hover{background:rgba(255,255,255,.25)}.btn.active{background:rgba(88,166,255,.3);border-color:#58a6ff}</style></head><body>
<div id="ui">
  <h1>🌧️ 点击雨幕</h1>
  <button class="btn active" data-m="rain">🌧️ 细雨</button>
  <button class="btn" data-m="storm">⛈️ 暴雨</button>
  <button class="btn" data-m="snow">❄️ 飘雪</button>
</div>
<canvas id="c"></canvas>
<script type="module" src="./src/main.ts"></script>
</body></html>
